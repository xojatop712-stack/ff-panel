name: Build Gemini Panel

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Theos
      run: |
        export THEOS=~/theos
        git clone --recursive https://github.com/theos/theos.git $THEOS
        
        # SDKni boshqa usulda yuklab olish va ochish
        mkdir -p $THEOS/sdks
        curl -L https://github.com/theos/sdks/raw/master/iPhoneOS14.5.sdk.tar.xz -o iPhoneOS14.5.sdk.tar.xz
        
        # Bu yerda formatni aniq ko'rsatib ochamiz
        xz -d < iPhoneOS14.5.sdk.tar.xz | tar -xvf - -C $THEOS/sdks
        
        echo "THEOS=$THEOS" >> $GITHUB_ENV

    - name: Build Package
      run: |
        export THEOS=~/theos
        make package FINALPACKAGE=1
        
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Gemini-Panel-Deb
        path: packages/*.deb
