name: Build and Inject Gemini Panel

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install Dependencies
      run: |
        brew install ldid xz
        git clone https://github.com/Al4ise/Azule ~/Azule
        sudo ln -sf ~/Azule/azule /usr/local/bin/azule

    - name: Set up Theos
      run: |
        export THEOS=~/theos
        git clone --recursive https://github.com/theos/theos.git $THEOS
        mkdir -p $THEOS/sdks
        git clone https://github.com/theos/sdks.git ~/sdks
        cp -r ~/sdks/iPhoneOS14.5.sdk $THEOS/sdks/
        echo "THEOS=$THEOS" >> $GITHUB_ENV

    - name: Download Original IPA from Google Drive
      run: |
        # Sizning Google Drive ID raqamingiz o'rnatildi
        DRIVE_ID="1CFeFXg5fNvNZS91SR-OP2abbVprSF_j_"
        
        # Google Drive-dan katta fayllarni to'g'ridan-to'g'ri yuklash
        curl -L "https://docs.google.com/uc?export=download&id=${DRIVE_ID}" -o origin.ipa
        
        # Fayl yuklanganini tekshirish
        ls -lh origin.ipa

    - name: Build Tweak and Inject
      run: |
        export THEOS=~/theos
        make clean
        make package FINALPACKAGE=1
        
        # .deb faylini aniqlash
        DEB_FILE=$(ls packages/*.deb | head -n 1)
        
        # Azule yordamida panelni o'yinga joylash
        azule -i origin.ipa -f "$DEB_FILE" -o . -v
        
        # Tayyor fayl nomini to'g'irlash
        mv *.ipa Gemini-Modded.ipa

    - name: Upload Modded IPA
      uses: actions/upload-artifact@v4
      with:
        name: Gemini-Modded-IPA
        path: Gemini-Modded.ipa
