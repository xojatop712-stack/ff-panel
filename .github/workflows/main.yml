name: Build and Inject Gemini Panel

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install Dependencies
      run: |
        brew install ldid xz
        git clone https://github.com/Al4ise/Azule ~/Azule
        sudo ln -sf ~/Azule/azule /usr/local/bin/azule

    - name: Set up Theos
      run: |
        export THEOS=~/theos
        git clone --recursive https://github.com/theos/theos.git $THEOS
        mkdir -p $THEOS/sdks
        git clone https://github.com/theos/sdks.git ~/sdks
        cp -r ~/sdks/iPhoneOS14.5.sdk $THEOS/sdks/
        echo "THEOS=$THEOS" >> $GITHUB_ENV

    - name: Download Original IPA from Dropbox
      run: |
        # Siz bergan Dropbox Direct Link o'rnatildi
        DROPBOX_URL="https://www.dropbox.com/scl/fi/h90rdsedl3m83t48umtd4/origin.ipa?rlkey=vggr45ro47k5kaf2nv65619mp&st=79r9key2&dl=1"
        
        curl -L "$DROPBOX_URL" -o origin.ipa
        
        # Fayl hajmini tekshirish
        ls -lh origin.ipa
        actual_size=$(stat -f%z origin.ipa)
        if [ $actual_size -lt 1000000000 ]; then
          echo "XATO: Fayl to'liq yuklanmadi! Hajmi: $actual_size bytes."
          exit 1
        fi

    - name: Build Tweak and Inject
      run: |
        export THEOS=~/theos
        make clean
        make package FINALPACKAGE=1
        
        DEB_FILE=$(ls packages/*.deb | head -n 1)
        
        # Azule yordamida mod qilish. -o . chiqish papkasini belgilaydi
        azule -i origin.ipa -f "$DEB_FILE" -o . -v
        
        # Tayyorlangan faylni qidirish va nomini to'g'irlash
        find . -name "*.ipa" ! -name "origin.ipa" -exec mv {} Gemini-Modded.ipa \;

    - name: Upload Modded IPA
      uses: actions/upload-artifact@v4
      with:
        name: Gemini-Modded-IPA
        path: Gemini-Modded.ipa
