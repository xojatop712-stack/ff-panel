name: Build and Inject Gemini Panel

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install Dependencies
      run: |
        brew install ldid xz wget
        git clone https://github.com/Al4ise/Azule ~/Azule
        sudo ln -sf ~/Azule/azule /usr/local/bin/azule

    - name: Set up Theos
      run: |
        export THEOS=~/theos
        git clone --recursive https://github.com/theos/theos.git $THEOS
        mkdir -p $THEOS/sdks
        git clone https://github.com/theos/sdks.git ~/sdks
        cp -r ~/sdks/iPhoneOS14.5.sdk $THEOS/sdks/
        echo "THEOS=$THEOS" >> $GITHUB_ENV

    - name: Download Original IPA from Google Drive
      run: |
        # Google Drive-dan barqaror yuklash (wget yordamida)
        FILE_ID="1CFeFXg5fNvNZS91SR-OP2abbVprSF_j_"
        wget --load-cookies /tmp/cookies.txt "https://docs.google.com/uc?export=download&confirm=$(wget --quiet --save-cookies /tmp/cookies.txt --keep-session-cookies --no-check-certificate 'https://docs.google.com/uc?export=download&id='${FILE_ID} -O- | sed -rn 's/.*confirm=([0-9A-Za-z_]+).*/\1/p')&id="${FILE_ID} -O origin.ipa && rm -rf /tmp/cookies.txt
        
        # Yuklangan faylni hajmini tekshirish
        ls -lh origin.ipa

    - name: Build Tweak and Inject
      run: |
        export THEOS=~/theos
        make clean
        make package FINALPACKAGE=1
        
        DEB_FILE=$(ls packages/*.deb | head -n 1)
        
        # Azule orqali mod qilish (agar origin.ipa haqiqiy bo'lsa ishlaydi)
        azule -i origin.ipa -f "$DEB_FILE" -o . -v
        
        # Nomini to'g'irlash
        mv *.ipa Gemini-Modded.ipa

    - name: Upload Modded IPA
      uses: actions/upload-artifact@v4
      with:
        name: Gemini-Modded-IPA
        path: Gemini-Modded.ipa
