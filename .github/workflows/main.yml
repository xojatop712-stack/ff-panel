name: Build and Inject Gemini Panel

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install Dependencies
      run: |
        brew install ldid xz
        git clone https://github.com/Al4ise/Azule ~/Azule
        sudo ln -sf ~/Azule/azule /usr/local/bin/azule

    - name: Set up Theos
      run: |
        export THEOS=~/theos
        git clone --recursive https://github.com/theos/theos.git $THEOS
        mkdir -p $THEOS/sdks
        git clone https://github.com/theos/sdks.git ~/sdks
        cp -r ~/sdks/iPhoneOS14.5.sdk $THEOS/sdks/
        echo "THEOS=$THEOS" >> $GITHUB_ENV

    - name: Download Original IPA from Dropbox
      run: |
        # Dropbox linkingiz barqaror ishlayapti
        curl -L "https://www.dropbox.com/scl/fi/h90rdsedl3m83t48umtd4/origin.ipa?rlkey=vggr45ro47k5kaf2nv65619mp&st=79r9key2&dl=1" -o origin.ipa

    - name: Build Tweak
      run: |
        export THEOS=~/theos
        export ARCHS="arm64"
        make clean
        make package FINALPACKAGE=1
        
        # Packages ichidagi har qanday .deb faylini ildiz papkaga panel.deb deb olib chiqamiz
        # Bu Azule adashib ketmasligi uchun eng xavfsiz yo'l
        find packages -name "*.deb" -exec cp {} ./panel.deb \;
        
        if [ ! -f "panel.deb" ]; then
          echo "XATO: Tweak paketi yaratilmadi!"
          exit 1
        fi

    - name: Inject with Azule
      run: |
        # Natija uchun papka ochish
        mkdir -p out
        
        # Azule-ga fayl yo'llarini to'g'ridan-to'g'ri ko'rsatamiz
        # Bu 'exit code 5' xatosini yo'qotadi
        azule -i origin.ipa -f panel.deb -o ./out -v
        
        # Tayyor faylni topish va nomini o'zgartirish
        find out -name "*.ipa" -exec mv {} Gemini-Modded.ipa \;

    - name: Upload Modded IPA
      uses: actions/upload-artifact@v4
      with:
        name: Gemini-Modded-IPA
        path: Gemini-Modded.ipa
