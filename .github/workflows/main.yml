name: Build Gemini Panel

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install Dependencies
      run: |
        brew install ldid xz

    - name: Set up Theos
      run: |
        export THEOS=~/theos
        git clone --recursive https://github.com/theos/theos.git $THEOS
        
        # SDKlarni ishonchli manbadan yuklab olish (bu usul xato bermaydi)
        mkdir -p $THEOS/sdks
        git clone https://github.com/theos/sdks.git ~/sdks
        cp -r ~/sdks/iPhoneOS14.5.sdk $THEOS/sdks/
        
        echo "THEOS=$THEOS" >> $GITHUB_ENV

    - name: Build Package
      run: |
        export THEOS=~/theos
        make clean
        make package FINALPACKAGE=1
        
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Gemini-Panel-Deb
        path: packages/*.deb
