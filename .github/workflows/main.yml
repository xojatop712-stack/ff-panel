name: Build and Inject Gemini Panel

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install Dependencies
      run: |
        brew install ldid xz wget
        git clone https://github.com/Al4ise/Azule ~/Azule
        sudo ln -sf ~/Azule/azule /usr/local/bin/azule

    - name: Set up Theos
      run: |
        export THEOS=~/theos
        git clone --recursive https://github.com/theos/theos.git $THEOS
        mkdir -p $THEOS/sdks
        git clone https://github.com/theos/sdks.git ~/sdks
        cp -r ~/sdks/iPhoneOS14.5.sdk $THEOS/sdks/
        echo "THEOS=$THEOS" >> $GITHUB_ENV

    - name: Download Original IPA from Google Drive
      run: |
        FILE_ID="1CFeFXg5fNvNZS91SR-OP2abbVprSF_j_"
        
        # Google Drive Virus Scan ogohlantirishini chetlab o'tish
        curl -c /tmp/cookies.txt -sL "https://docs.google.com/uc?export=download&id=${FILE_ID}" > /dev/null
        CONFIRM=$(curl -b /tmp/cookies.txt -sL "https://docs.google.com/uc?export=download&id=${FILE_ID}" | grep -o 'confirm=[^&]*' | head -1)
        curl -b /tmp/cookies.txt -L "https://docs.google.com/uc?export=download&${CONFIRM}&id=${FILE_ID}" -o origin.ipa
        
        # Fayl hajmini tekshirish (1 GB dan kam bo'lsa build to'xtaydi)
        actual_size=$(stat -f%z origin.ipa)
        if [ $actual_size -lt 1000000000 ]; then
          echo "XATO: Fayl to'liq yuklanmadi! Hajmi: $actual_size bytes."
          head -n 5 origin.ipa
          exit 1
        fi
        echo "Muvaffaqiyatli yuklandi: $actual_size bytes."

    - name: Build Tweak and Inject
      run: |
        export THEOS=~/theos
        make clean
        make package FINALPACKAGE=1
        
        # .deb faylini topish
        DEB_FILE=$(ls packages/*.deb | head -n 1)
        
        # Azule orqali IPA ichiga inject qilish
        # -o . (nuqta) joriy papkaga saqlashni bildiradi
        azule -i origin.ipa -f "$DEB_FILE" -o . -v
        
        # Tayyor fayl nomini standart holatga keltirish
        mv *.ipa Gemini-Modded.ipa

    - name: Upload Modded IPA
      uses: actions/upload-artifact@v4
      with:
        name: Gemini-Modded-IPA
        path: Gemini-Modded.ipa
