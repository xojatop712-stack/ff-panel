name: Build and Inject Gemini Panel

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install Dependencies
      run: |
        brew install ldid xz
        git clone https://github.com/Al4ise/Azule ~/Azule
        sudo ln -sf ~/Azule/azule /usr/local/bin/azule

    - name: Set up Theos
      run: |
        export THEOS=~/theos
        git clone --recursive https://github.com/theos/theos.git $THEOS
        mkdir -p $THEOS/sdks
        git clone https://github.com/theos/sdks.git ~/sdks
        cp -r ~/sdks/iPhoneOS14.5.sdk $THEOS/sdks/
        echo "THEOS=$THEOS" >> $GITHUB_ENV

    - name: Download Original IPA from Dropbox
      run: |
        # Dropbox linkingiz 100% ishlamoqda
        curl -L "https://www.dropbox.com/scl/fi/h90rdsedl3m83t48umtd4/origin.ipa?rlkey=vggr45ro47k5kaf2nv65619mp&st=79r9key2&dl=1" -o origin.ipa

    - name: Build Tweak
      run: |
        export THEOS=~/theos
        export ARCHS="arm64"
        make clean
        make package FINALPACKAGE=1
        
        # Har qanday .deb faylini ildiz papkaga panel.deb nomi bilan olib chiqamiz
        find packages -name "*.deb" -exec cp {} ./panel.deb \;
        
        if [ ! -f "panel.deb" ]; then
          echo "XATO: .deb fayli yaratilmadi!"
          exit 1
        fi

    - name: Inject with Azule (Manual Path)
      run: |
        # Azule-ga fayllarni aniq ko'rsatamiz
        # -i (ipa), -f (file/deb), -o (output directory)
        azule -i origin.ipa -f panel.deb -o ./output -v
        
        # Tayyor faylni topish va nomini to'g'irlash
        mv output/*.ipa Gemini-Modded.ipa

    - name: Upload Modded IPA
      uses: actions/upload-artifact@v4
      with:
        name: Gemini-Modded-IPA
        path: Gemini-Modded.ipa
