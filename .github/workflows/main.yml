name: Build Gemini Panel

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Theos
      run: |
        export THEOS=~/theos
        # Theos-ni yuklab olish
        git clone --recursive https://github.com/theos/theos.git $THEOS
        
        # SDK-ni qo'lda yuklash (GitHub API xatosidan qochish uchun)
        mkdir -p $THEOS/sdks
        curl -LO https://github.com/theos/sdks/raw/master/iPhoneOS14.5.sdk.tar.xz
        tar -xvf iPhoneOS14.5.sdk.tar.xz -C $THEOS/sdks
        rm iPhoneOS14.5.sdk.tar.xz
        
        echo "THEOS=$THEOS" >> $GITHUB_ENV

    - name: Build Package
      run: |
        export THEOS=~/theos
        make package FINALPACKAGE=1
        
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Gemini-Panel-Deb
        path: packages/*.deb
