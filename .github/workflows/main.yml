name: Build and Inject Gemini Panel

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install Dependencies
      run: |
        brew install ldid xz wget
        git clone https://github.com/Al4ise/Azule ~/Azule
        sudo ln -sf ~/Azule/azule /usr/local/bin/azule

    - name: Set up Theos
      run: |
        export THEOS=~/theos
        git clone --recursive https://github.com/theos/theos.git $THEOS
        mkdir -p $THEOS/sdks
        git clone https://github.com/theos/sdks.git ~/sdks
        cp -r ~/sdks/iPhoneOS14.5.sdk $THEOS/sdks/
        echo "THEOS=$THEOS" >> $GITHUB_ENV

    - name: Download Original IPA from Google Drive
      run: |
        FILE_ID="1CFeFXg5fNvNZS91SR-OP2abbVprSF_j_"
        
        # Google Drive cookies va confirm kodini olish (yanada kuchaytirilgan usul)
        wget --quiet --save-cookies /tmp/cookies.txt --keep-session-cookies --no-check-certificate "https://docs.google.com/uc?export=download&id=${FILE_ID}" -O- > /dev/null
        CONFIRM=$(wget --quiet --load-cookies /tmp/cookies.txt --keep-session-cookies --no-check-certificate "https://docs.google.com/uc?export=download&id=${FILE_ID}" -O- | sed -rn 's/.*confirm=([0-9A-Za-z_]+).*/\1/p')
        wget --load-cookies /tmp/cookies.txt "https://docs.google.com/uc?export=download&confirm=${CONFIRM}&id=${FILE_ID}" -O origin.ipa
        rm -rf /tmp/cookies.txt

        # Fayl hajmini tekshirish (1.2 GB bo'lishi shart)
        actual_size=$(stat -f%z origin.ipa)
        if [ $actual_size -lt 1100000000 ]; then
          echo "XATO: Fayl to'liq yuklanmadi! Hajmi juda kichik: $actual_size bytes."
          echo "Yuklangan kontent boshi:"
          head -n 20 origin.ipa
          exit 1
        fi
        echo "Muvaffaqiyatli yuklandi: $actual_size bytes."

    - name: Build Tweak and Inject
      run: |
        export THEOS=~/theos
        make clean
        make package FINALPACKAGE=1
        
        DEB_FILE=$(ls packages/*.deb | head -n 1)
        
        # Azule buyrug'ini barcha parametrlari bilan ishlatish
        # -v (verbose) loglarni ko'rish uchun
        # -o . (nuqta) joriy papkaga saqlash uchun
        azule -i origin.ipa -f "$DEB_FILE" -o . -v
        
        # Tayyor faylni qidirish va nomini o'zgartirish
        find . -name "*.ipa" ! -name "origin.ipa" -exec mv {} Gemini-Modded.ipa \;

    - name: Upload Modded IPA
      uses: actions/upload-artifact@v4
      with:
        name: Gemini-Modded-IPA
        path: Gemini-Modded.ipa
